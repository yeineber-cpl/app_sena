<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensajero GPS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }
        
        .container {
            max-width: 400px;
            margin: 0 auto;
            padding-top: 40px;
        }
        
        h1 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 40px;
        }
        
        .box {
            background: white;
            color: #333;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        input {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        
        button {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 10px;
        }
        
        .btn-green { background: #4CAF50; color: white; }
        .btn-blue { background: #2196F3; color: white; }
        .btn-red { background: #f44336; color: white; }
        .btn-gray { background: #999; color: white; }
        
        .status {
            text-align: center;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .status h2 {
            font-size: 22px;
            margin-bottom: 10px;
            color: #333;
        }
        
        .badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }
        
        .badge-active { background: #4CAF50; color: white; }
        .badge-inactive { background: #999; color: white; }
        
        .coords {
            background: #2c3e50;
            color: #2ecc71;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            margin-top: 15px;
        }
        
        .hidden { display: none; }
        
        .alert {
            background: #ff9800;
            color: black;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.6;
        }
        
        .success {
            background: #4CAF50;
            color: white;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏍️ GPS Mensajero</h1>

        <!-- Login -->
        <div id="loginScreen">
            <div class="box">
                <div class="alert">
                    <strong>⚠️ Importante:</strong><br>
                    1. Activa el GPS de tu teléfono<br>
                    2. Acepta los permisos cuando aparezcan
                </div>
                <input type="text" id="nameInput" placeholder="Tu nombre" maxlength="20">
                <button class="btn-green" onclick="iniciar()">INICIAR</button>
            </div>
        </div>

        <!-- Tracking -->
        <div id="trackingScreen" class="hidden">
            <div class="box">
                <div class="status">
                    <h2 id="userName">-</h2>
                    <span id="badge" class="badge badge-inactive">INACTIVO</span>
                    <div id="coords" class="coords hidden">
                        Lat: <span id="lat">-</span><br>
                        Lng: <span id="lng">-</span><br>
                        <span id="time">-</span>
                    </div>
                </div>

                <button id="btnStart" class="btn-blue" onclick="empezar()">
                    ▶️ COMENZAR TRACKING
                </button>
                
                <button id="btnStop" class="btn-red hidden" onclick="parar()">
                    ⏹️ DETENER
                </button>
                
                <button class="btn-gray" onclick="salir()">
                    Cerrar Sesión
                </button>

                <div id="mensaje" class="success hidden"></div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAF7b2RUPHHPnD9ivi2mWYw28W6MAElnsI",
            authDomain: "app-prueba-81401.firebaseapp.com",
            databaseURL: "https://app-prueba-81401-default-rtdb.firebaseio.com",
            projectId: "app-prueba-81401",
            storageBucket: "app-prueba-81401.firebasestorage.app",
            messagingSenderId: "890068669823",
            appId: "1:890068669823:web:179ef83c1ab38d516d764a"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let usuario = null;
        let watchId = null;

        function log(msg) {
            console.log('[APP] ' + msg);
        }

        function iniciar() {
            const nombre = document.getElementById('nameInput').value.trim();
            
            if (!nombre) {
                alert('Por favor escribe tu nombre');
                return;
            }

            usuario = {
                id: 'user_' + Date.now(),
                nombre: nombre,
                activo: false,
                lat: null,
                lng: null
            };

            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('trackingScreen').classList.remove('hidden');
            document.getElementById('userName').textContent = nombre;

            log('Sesión iniciada: ' + nombre);
            guardar();
        }

        function empezar() {
            if (!navigator.geolocation) {
                alert('❌ Tu navegador no soporta GPS');
                return;
            }

            log('Solicitando permisos GPS...');

            navigator.geolocation.getCurrentPosition(
                function exito(pos) {
                    log('✅ GPS autorizado!');
                    
                    usuario.activo = true;
                    usuario.lat = pos.coords.latitude;
                    usuario.lng = pos.coords.longitude;

                    document.getElementById('btnStart').classList.add('hidden');
                    document.getElementById('btnStop').classList.remove('hidden');
                    document.getElementById('badge').className = 'badge badge-active';
                    document.getElementById('badge').textContent = 'ACTIVO';
                    document.getElementById('coords').classList.remove('hidden');
                    
                    actualizar(pos);
                    guardar();

                    document.getElementById('mensaje').textContent = '✅ Tracking activado!';
                    document.getElementById('mensaje').classList.remove('hidden');

                    // Tracking continuo
                    watchId = navigator.geolocation.watchPosition(
                        function(position) {
                            usuario.lat = position.coords.latitude;
                            usuario.lng = position.coords.longitude;
                            actualizar(position);
                            guardar();
                            log('📍 Posición actualizada');
                        },
                        function(error) {
                            log('❌ Error GPS: ' + error.message);
                            alert('Error al rastrear ubicación');
                        },
                        {
                            enableHighAccuracy: true,
                            timeout: 20000,
                            maximumAge: 10000
                        }
                    );
                },
                function error(err) {
                    log('❌ Error GPS: Código ' + err.code);
                    
                    let msg = '❌ No se pudo acceder al GPS\n\n';
                    
                    if (err.code === 1) {
                        msg += 'PERMISOS DENEGADOS\n\n';
                        msg += 'Pasos:\n';
                        msg += '1. Toca el candado 🔒 junto a la URL\n';
                        msg += '2. Toca "Permisos"\n';
                        msg += '3. Activa "Ubicación"\n';
                        msg += '4. Recarga la página';
                    } else if (err.code === 2) {
                        msg += 'GPS NO DISPONIBLE\n\n';
                        msg += '• Activa el GPS en tu teléfono\n';
                        msg += '• Sal al exterior si estás adentro';
                    } else {
                        msg += 'TIEMPO AGOTADO\n\n';
                        msg += 'La señal GPS es débil.\n';
                        msg += 'Intenta de nuevo.';
                    }
                    
                    alert(msg);
                },
                {
                    enableHighAccuracy: true,
                    timeout: 20000,
                    maximumAge: 0
                }
            );
        }

        function parar() {
            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }

            usuario.activo = false;

            document.getElementById('btnStart').classList.remove('hidden');
            document.getElementById('btnStop').classList.add('hidden');
            document.getElementById('badge').className = 'badge badge-inactive';
            document.getElementById('badge').textContent = 'INACTIVO';
            document.getElementById('mensaje').classList.add('hidden');

            guardar();
            log('Tracking detenido');
        }

        function salir() {
            if (usuario.activo) {
                parar();
            }

            if (usuario) {
                db.ref('mensajeros/' + usuario.id).remove();
            }

            usuario = null;
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('trackingScreen').classList.add('hidden');
            document.getElementById('nameInput').value = '';
            document.getElementById('coords').classList.add('hidden');

            log('Sesión cerrada');
        }

        function actualizar(pos) {
            document.getElementById('lat').textContent = pos.coords.latitude.toFixed(6);
            document.getElementById('lng').textContent = pos.coords.longitude.toFixed(6);
            document.getElementById('time').textContent = new Date().toLocaleTimeString('es-CO');
        }

        function guardar() {
            if (!usuario) return;

            const data = {
                id: usuario.id,
                nombre: usuario.nombre,
                activo: usuario.activo,
                lat: usuario.lat,
                lng: usuario.lng,
                timestamp: Date.now()
            };

            db.ref('mensajeros/' + usuario.id).set(data)
                .then(() => log('💾 Guardado en Firebase'))
                .catch(err => log('❌ Error: ' + err.message));
        }

        window.addEventListener('beforeunload', function() {
            if (usuario && usuario.activo) {
                parar();
            }
        });

        log('App cargada y lista');
    </script>
</body>
</html>
