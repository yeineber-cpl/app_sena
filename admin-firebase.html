<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Firebase</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
        }

        .header {
            background: #1a1a2e;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .container {
            display: flex;
            height: calc(100vh - 90px);
        }

        .sidebar {
            width: 300px;
            background: white;
            padding: 20px;
            overflow-y: auto;
        }

        #map {
            flex: 1;
        }

        .stat {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }

        .stat-number {
            font-size: 48px;
            font-weight: bold;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }

        .messenger {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s;
            border-left: 4px solid #4CAF50;
        }

        .messenger:hover {
            background: #e0e0e0;
            transform: translateX(5px);
        }

        .messenger.inactive {
            border-left-color: #999;
            opacity: 0.6;
        }

        .messenger-name {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .messenger-status {
            font-size: 12px;
            color: #666;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 5px;
        }

        .status-dot.active {
            background: #4CAF50;
            animation: pulse 2s infinite;
        }

        .status-dot.inactive {
            background: #999;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .no-data {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .error {
            background: #f44336;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .connection-status {
            background: #4CAF50;
            color: white;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 12px;
        }

        .connection-status.disconnected {
            background: #f44336;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: 40vh;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚚 Panel de Administración - Firebase</h1>
        <p>Tracking GPS en tiempo real</p>
    </div>

    <div class="container">
        <div class="sidebar">
            <!-- Error de configuración -->
            <div id="configError" class="error" style="display: none;">
                ⚠️ <strong>CONFIGURACIÓN PENDIENTE</strong><br>
                Debes pegar tu configuración de Firebase en el código.<br>
                Lee README-FIREBASE.md
            </div>

            <!-- Estado de conexión -->
            <div id="connectionStatus" class="connection-status" style="display: none;">
                🟢 Conectado a Firebase
            </div>

            <div class="stat">
                <div class="stat-number" id="activeCount">0</div>
                <div class="stat-label">Mensajeros Activos</div>
            </div>

            <h3 style="margin-bottom: 15px;">Mensajeros:</h3>

            <div id="messengerList">
                <div class="no-data">
                    Esperando conexión a Firebase...
                </div>
            </div>
        </div>

        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        // ============================================
        // 🔥 CONFIGURACIÓN DE FIREBASE
        // ============================================
        // INSTRUCCIONES: Reemplaza este objeto con tu configuración de Firebase
        // Debe ser EXACTAMENTE la misma que en mobile-firebase.html
        
        const firebaseConfig = {
            apiKey: "AIzaSyAF7b2RUPHHPnD9ivi2mWYw28W6MAElnsI",
            authDomain: "app-prueba-81401.firebaseapp.com",
            databaseURL: "https://app-prueba-81401-default-rtdb.firebaseio.com",
            projectId: "app-prueba-81401",
            storageBucket: "app-prueba-81401.firebasestorage.app",
            messagingSenderId: "890068669823",
            appId: "1:890068669823:web:179ef83c1ab38d516d764a"
        };

        // ============================================
        // NO MODIFIQUES NADA DEBAJO DE ESTA LÍNEA
        // ============================================

        // Inicializar mapa (Barranquilla)
        const map = L.map('map').setView([10.9639, -74.7964], 13);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19
        }).addTo(map);

        const markers = {};
        const routes = {};
        let messengers = {};

        // Verificar configuración
        if (firebaseConfig.apiKey === "TU_API_KEY_AQUI") {
            document.getElementById('configError').style.display = 'block';
            document.getElementById('messengerList').innerHTML = '<div class="no-data">Firebase no configurado</div>';
            console.error('❌ Firebase no configurado');
        } else {
            // Inicializar Firebase
            firebase.initializeApp(firebaseConfig);
            const database = firebase.database();
            document.getElementById('connectionStatus').style.display = 'block';
            console.log('✅ Firebase inicializado');

            // Escuchar cambios en tiempo real
            database.ref('messengers').on('value', (snapshot) => {
                messengers = snapshot.val() || {};
                updateUI();
                console.log('📡 Datos actualizados desde Firebase');
            });

            // Detectar desconexión
            database.ref('.info/connected').on('value', (snapshot) => {
                const status = document.getElementById('connectionStatus');
                if (snapshot.val() === true) {
                    status.className = 'connection-status';
                    status.textContent = '🟢 Conectado a Firebase';
                } else {
                    status.className = 'connection-status disconnected';
                    status.textContent = '🔴 Desconectado de Firebase';
                }
            });
        }

        function updateUI() {
            const messengerArray = Object.values(messengers);
            const active = messengerArray.filter(m => m.tracking);
            
            // Actualizar contador
            document.getElementById('activeCount').textContent = active.length;

            // Actualizar lista
            const list = document.getElementById('messengerList');
            
            if (messengerArray.length === 0) {
                list.innerHTML = `
                    <div class="no-data">
                        No hay mensajeros conectados.<br><br>
                        Abre mobile-firebase.html en un teléfono.
                    </div>
                `;
            } else {
                list.innerHTML = messengerArray.map(m => `
                    <div class="messenger ${m.tracking ? 'active' : 'inactive'}" onclick="centerMap('${m.id}')">
                        <div class="messenger-name">${m.name}</div>
                        <div class="messenger-status">
                            <span class="status-dot ${m.tracking ? 'active' : 'inactive'}"></span>
                            ${m.tracking ? 'En ruta' : 'Inactivo'}
                            ${m.lastUpdate ? ' - ' + new Date(m.lastUpdate).toLocaleTimeString('es-CO') : ''}
                        </div>
                    </div>
                `).join('');
            }

            // Actualizar mapa
            updateMap(messengerArray);
        }

        function updateMap(messengerArray) {
            // Limpiar marcadores viejos
            Object.keys(markers).forEach(id => {
                if (!messengerArray.find(m => m.id === id)) {
                    map.removeLayer(markers[id]);
                    delete markers[id];
                    if (routes[id]) {
                        map.removeLayer(routes[id]);
                        delete routes[id];
                    }
                }
            });

            // Actualizar/crear marcadores
            messengerArray.forEach(m => {
                if (m.location) {
                    const color = m.tracking ? '#4CAF50' : '#999';

                    if (markers[m.id]) {
                        markers[m.id].setLatLng([m.location.lat, m.location.lng]);
                    } else {
                        const icon = L.divIcon({
                            html: `<div style="background: ${color}; width: 30px; height: 30px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center;">🏍️</div>`,
                            className: '',
                            iconSize: [30, 30]
                        });

                        markers[m.id] = L.marker([m.location.lat, m.location.lng], { icon })
                            .bindPopup(`<b>${m.name}</b><br>${m.tracking ? '🟢 Activo' : '⚪ Inactivo'}`)
                            .addTo(map);
                    }

                    // Ruta
                    if (m.route && m.route.length > 1) {
                        if (routes[m.id]) {
                            routes[m.id].setLatLngs(m.route);
                        } else {
                            routes[m.id] = L.polyline(m.route, {
                                color: '#2196F3',
                                weight: 3,
                                opacity: 0.7
                            }).addTo(map);
                        }
                    }
                }
            });

            // Centrar mapa
            const active = messengerArray.filter(m => m.tracking && m.location);
            if (active.length > 0) {
                const bounds = L.latLngBounds(active.map(m => [m.location.lat, m.location.lng]));
                map.fitBounds(bounds, { padding: [50, 50], maxZoom: 15 });
            }
        }

        function centerMap(id) {
            const m = messengers[id];
            if (m && m.location) {
                map.setView([m.location.lat, m.location.lng], 16);
                markers[id].openPopup();
            }
        }

        console.log('✅ Panel cargado');
    </script>
</body>
</html>
