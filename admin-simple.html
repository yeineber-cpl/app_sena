<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Tracking</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
        }

        .header {
            background: #1a1a2e;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .container {
            display: flex;
            height: calc(100vh - 90px);
        }

        .sidebar {
            width: 300px;
            background: white;
            padding: 20px;
            overflow-y: auto;
        }

        #map {
            flex: 1;
        }

        .stat {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }

        .stat-number {
            font-size: 48px;
            font-weight: bold;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }

        .messenger {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s;
            border-left: 4px solid #4CAF50;
        }

        .messenger:hover {
            background: #e0e0e0;
            transform: translateX(5px);
        }

        .messenger.inactive {
            border-left-color: #999;
            opacity: 0.6;
        }

        .messenger-name {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .messenger-status {
            font-size: 12px;
            color: #666;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 5px;
        }

        .status-dot.active {
            background: #4CAF50;
        }

        .status-dot.inactive {
            background: #999;
        }

        .refresh-btn {
            width: 100%;
            padding: 15px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }

        .refresh-btn:hover {
            background: #1976D2;
        }

        .no-data {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: 40vh;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚚 Panel de Administración</h1>
        <p>Tracking GPS en tiempo real</p>
    </div>

    <div class="container">
        <div class="sidebar">
            <div class="stat">
                <div class="stat-number" id="activeCount">0</div>
                <div class="stat-label">Mensajeros Activos</div>
            </div>

            <h3 style="margin-bottom: 15px;">Mensajeros:</h3>

            <div id="messengerList">
                <div class="no-data">
                    No hay mensajeros conectados.<br><br>
                    Abre mobile-simple.html en un teléfono.
                </div>
            </div>

            <button class="refresh-btn" onclick="refresh()">🔄 Actualizar</button>
        </div>

        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Inicializar mapa (Barranquilla)
        const map = L.map('map').setView([10.9639, -74.7964], 13);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19
        }).addTo(map);

        const markers = {};
        const routes = {};

        function load() {
            return JSON.parse(localStorage.getItem('messengers') || '[]');
        }

        function refresh() {
            const messengers = load();
            const active = messengers.filter(m => m.tracking);
            
            // Actualizar contador
            document.getElementById('activeCount').textContent = active.length;

            // Actualizar lista
            const list = document.getElementById('messengerList');
            
            if (messengers.length === 0) {
                list.innerHTML = `
                    <div class="no-data">
                        No hay mensajeros registrados.<br><br>
                        Abre mobile-simple.html en un teléfono.
                    </div>
                `;
            } else {
                list.innerHTML = messengers.map(m => `
                    <div class="messenger ${m.tracking ? 'active' : 'inactive'}" onclick="centerMap('${m.id}')">
                        <div class="messenger-name">${m.name}</div>
                        <div class="messenger-status">
                            <span class="status-dot ${m.tracking ? 'active' : 'inactive'}"></span>
                            ${m.tracking ? 'En ruta' : 'Inactivo'}
                            ${m.lastUpdate ? ' - ' + new Date(m.lastUpdate).toLocaleTimeString('es-CO') : ''}
                        </div>
                    </div>
                `).join('');
            }

            // Actualizar mapa
            updateMap(messengers);
        }

        function updateMap(messengers) {
            // Limpiar marcadores viejos
            Object.keys(markers).forEach(id => {
                if (!messengers.find(m => m.id === id)) {
                    map.removeLayer(markers[id]);
                    delete markers[id];
                    if (routes[id]) {
                        map.removeLayer(routes[id]);
                        delete routes[id];
                    }
                }
            });

            // Actualizar/crear marcadores
            messengers.forEach(m => {
                if (m.location) {
                    const color = m.tracking ? '#4CAF50' : '#999';

                    if (markers[m.id]) {
                        markers[m.id].setLatLng([m.location.lat, m.location.lng]);
                    } else {
                        const icon = L.divIcon({
                            html: `<div style="background: ${color}; width: 30px; height: 30px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center;">🏍️</div>`,
                            className: '',
                            iconSize: [30, 30]
                        });

                        markers[m.id] = L.marker([m.location.lat, m.location.lng], { icon })
                            .bindPopup(`<b>${m.name}</b><br>${m.tracking ? '🟢 Activo' : '⚪ Inactivo'}`)
                            .addTo(map);
                    }

                    // Ruta
                    if (m.route && m.route.length > 1) {
                        if (routes[m.id]) {
                            routes[m.id].setLatLngs(m.route);
                        } else {
                            routes[m.id] = L.polyline(m.route, {
                                color: '#2196F3',
                                weight: 3,
                                opacity: 0.7
                            }).addTo(map);
                        }
                    }
                }
            });

            // Centrar mapa
            const active = messengers.filter(m => m.tracking && m.location);
            if (active.length > 0) {
                const bounds = L.latLngBounds(active.map(m => [m.location.lat, m.location.lng]));
                map.fitBounds(bounds, { padding: [50, 50], maxZoom: 15 });
            }
        }

        function centerMap(id) {
            const messengers = load();
            const m = messengers.find(u => u.id === id);
            if (m && m.location) {
                map.setView([m.location.lat, m.location.lng], 16);
                markers[id].openPopup();
            }
        }

        // Auto-actualizar cada 3 segundos
        setInterval(refresh, 3000);

        // Cargar al inicio
        refresh();

        console.log('✅ Panel cargado');
    </script>
</body>
</html>
